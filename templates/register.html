<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Resume Booster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="glass-card auth-card text-center">
        <div class="brand-icon mx-auto mb-3" style="width: 50px; height: 50px; font-size: 26px; border-radius: 14px;">RB</div>
        <h2 class="text-white mb-2 brand-font">Create Account</h2>
        <p class="text-secondary small mb-4">Start optimizing your resume for ATS tracking</p>
        
        <!-- Flash Alert inside Auth Card -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show border-0 text-white text-start mb-4 py-2" role="alert" style="background: rgba(var(--bs-{{ category }}-rgb), 0.15); font-size: 13px;">
                        <i class="fa-solid fa-circle-info me-2"></i>
                        {{ message }}
                        <button type="button" class="btn-close btn-close-white p-2" data-bs-dismiss="alert" aria-label="Close" style="top: 6px; right: 6px;"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST" class="text-start">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary small">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white-5" style="border-color: var(--border-color); color: var(--text-secondary);"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0 ps-0" id="username" name="username" placeholder="Choose a username" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label text-secondary small">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white-5" style="border-color: var(--border-color); color: var(--text-secondary);"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control form-control-custom border-start-0 ps-0" id="email" name="email" placeholder="name@domain.com" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label text-secondary small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white-5" style="border-color: var(--border-color); color: var(--text-secondary);"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0 ps-0" id="password" name="password" placeholder="Min. 8 characters" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="confirm_password" class="form-label text-secondary small">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white-5" style="border-color: var(--border-color); color: var(--text-secondary);"><i class="fa-solid fa-check-double"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0 ps-0" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mb-3">Sign Up</button>
            
            <p class="text-secondary small text-center mb-0">
                Already have an account? <a href="{{ url_for('auth.login') }}" class="text-indigo-400 text-decoration-none" style="color: #818cf8; font-weight: 500;">Sign In</a>
            </p>
        </form>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
